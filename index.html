<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronologia della Storia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.18);
    --bg: #0b0b0f;
    --surface: #13131a;
    --text: #e8e2d5;
    --text-dim: #7a7468;
    --line: rgba(201,168,76,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: 2rem;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(80,60,140,0.08) 0%, transparent 60%);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(201,168,76,0.04) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(201,168,76,0.04) 60px);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.6rem;
    opacity: 0;
    animation: fadeUp .8s .2s forwards;
  }
  .hero-title {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    opacity: 0;
    animation: fadeUp .9s .4s forwards;
  }
  .hero-title em { font-style: italic; color: var(--gold-light); }
  .hero-sub {
    margin-top: 1.8rem;
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--text-dim);
    max-width: 480px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp .9s .6s forwards;
  }
  .scroll-cue {
    position: absolute;
    bottom: 2.4rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .5rem;
    opacity: 0;
    animation: fadeIn 1s 1.2s forwards;
  }
  .scroll-cue span {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,11,15,0.92);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--line);
    padding: .9rem 2rem;
    display: flex;
    justify-content: center;
    gap: .6rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: .45rem 1.1rem;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 2px;
    transition: all .25s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  #event-count {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--text-dim);
    text-align: center;
    padding: .7rem;
  }

  /* ─── TIMELINE ─── */
  .timeline-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem 2rem 10rem;
    position: relative;
  }
  .timeline-section::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: linear-gradient(to bottom, transparent 0%, var(--gold) 2%, var(--gold) 98%, transparent 100%);
    opacity: .28;
  }

  .era-label {
    text-align: center;
    position: relative;
    z-index: 2;
    margin: 4rem 0 2.5rem;
  }
  .era-label:first-child { margin-top: 2rem; }
  .era-label span {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--bg);
    padding: .4rem 1.4rem;
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  .event {
    display: grid;
    grid-template-columns: 1fr 56px 1fr;
    align-items: start;
    margin-bottom: 2.8rem;
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .event.visible { opacity: 1; transform: translateY(0); }

  .event.right .card { grid-column: 3; }
  .event.right .spacer { grid-column: 1; }
  .event.left  .card { grid-column: 1; }

  .card {
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 4px;
    padding: 1.4rem 1.6rem;
    position: relative;
    transition: border-color .3s, box-shadow .3s;
  }
  .card:hover {
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .card::after {
    content: '';
    position: absolute;
    top: 1.8rem;
    width: 28px;
    height: 1px;
    background: var(--line);
  }
  .event.right .card::after { left: -29px; }
  .event.left  .card::after { right: -29px; }

  .node {
    grid-column: 2;
    display: flex;
    justify-content: center;
    padding-top: 1.6rem;
  }
  .node-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
    flex-shrink: 0;
    transition: transform .3s, box-shadow .3s;
  }
  .event:hover .node-dot {
    transform: scale(1.5);
    box-shadow: 0 0 0 8px rgba(201,168,76,0.08), 0 0 18px rgba(201,168,76,0.3);
  }

  .card-year {
    font-family: 'DM Mono', monospace;
    font-size: .67rem;
    letter-spacing: .2em;
    color: var(--gold);
    margin-bottom: .4rem;
  }
  .card-icon { font-size: 1.5rem; margin-bottom: .45rem; display: block; }
  .card-title {
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: .5rem;
  }
  .card-body {
    font-size: .95rem;
    font-weight: 300;
    line-height: 1.65;
    color: var(--text-dim);
  }
  .card-tag {
    display: inline-block;
    margin-top: .75rem;
    font-family: 'DM Mono', monospace;
    font-size: .6rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    padding: .2rem .6rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .tag-scienza  { color: #7ec8e3; border-color: rgba(126,200,227,.3); background: rgba(126,200,227,.06); }
  .tag-storia   { color: #e38a7e; border-color: rgba(227,138,126,.3); background: rgba(227,138,126,.06); }
  .tag-arte     { color: #a07ee3; border-color: rgba(160,126,227,.3); background: rgba(160,126,227,.06); }
  .tag-esplora  { color: #7ee3a0; border-color: rgba(126,227,160,.3); background: rgba(126,227,160,.06); }
  .tag-guerra   { color: #e3c07e; border-color: rgba(227,192,126,.3); background: rgba(227,192,126,.06); }
  .tag-politica { color: #e3a07e; border-color: rgba(227,160,126,.3); background: rgba(227,160,126,.06); }
  .tag-tech     { color: #7ecce3; border-color: rgba(126,204,227,.3); background: rgba(126,204,227,.06); }
  .tag-spazio   { color: #c07ee3; border-color: rgba(192,126,227,.3); background: rgba(192,126,227,.06); }

  #no-results {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: .15em;
    color: var(--text-dim);
    display: none;
  }

  footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--line);
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  @keyframes fadeUp  { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes scrollPulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  @media (max-width: 700px) {
    .timeline-section::before { left: 24px; }
    .event { grid-template-columns: 48px 1fr; }
    .event .node { grid-column: 1; grid-row: 1; }
    .event.right .card,
    .event.left  .card { grid-column: 2; grid-row: 1; }
    .event.right .spacer { display: none; }
    .event.right .card::after,
    .event.left  .card::after { left: -24px; right: auto; width: 20px; }
  }
</style>
</head>
<body>

<section class="hero">
  <p class="hero-eyebrow">Dalla Preistoria al presente</p>
  <h1 class="hero-title">La <em>Storia</em><br>dell'Umanità</h1>

  <div class="scroll-cue">
    <span>Scorri</span>

  </div>
</section>

<div class="filter-bar">

  <button class="filter-btn" data-filter="storia">Storia</button>

  <button class="filter-btn" data-filter="arte">Arte &amp; Cultura</button>
  <button class="filter-btn" data-filter="esplora">Esplorazioni</button>
  <button class="filter-btn" data-filter="guerra">Guerra</button>
  <button class="filter-btn" data-filter="politica">Politica</button>
  <button class="filter-btn" data-filter="tech">Tecnologia</button>
  <button class="filter-btn" data-filter="spazio">Spazio</button>
</div>

<div id="event-count"></div>
<section class="timeline-section" id="timeline"></section>
<div id="no-results">Nessun evento trovato per questa categoria.</div>

<footer><p>Cronologia della Storia Universale &nbsp;·&nbsp; Scorri, filtra, esplora</p></footer>

//  MOTORE DI RENDERING — non modificare
// ════════════════════════════════════════════════
const TAG_LABELS = {
  storia:'Storia', scienza:'Scienza', arte:'Arte & Cultura',
  esplora:'Esplorazioni', guerra:'Guerra', politica:'Politica',
  tech:'Tecnologia', spazio:'Spazio'
};

function buildTimeline(filter) {
  const container = document.getElementById('timeline');
  const noResults = document.getElementById('no-results');
  container.innerHTML = '';

  const filtered = filter === 'all' ? EVENTS : EVENTS.filter(e => e.cat === filter);

  if (filtered.length === 0) {
    noResults.style.display = 'block';
    document.getElementById('event-count').textContent = '';
    return;
  }
  noResults.style.display = 'none';
  document.getElementById('event-count').textContent =
    `${filtered.length} event${filtered.length === 1 ? 'o' : 'i'} ${filter === 'all' ? 'totali' : '· ' + TAG_LABELS[filter]}`;

  let currentEra = null;
  let sideIndex  = 0;

  filtered.forEach(ev => {
    if (ev.era !== currentEra) {
      currentEra = ev.era;
      sideIndex = 0;
      const era = document.createElement('div');
      era.className = 'era-label';
      era.innerHTML = `<span>${currentEra}</span>`;
      container.appendChild(era);
    }

    const side = sideIndex % 2 === 0 ? 'right' : 'left';
    sideIndex++;

    const el = document.createElement('div');
    el.className = `event ${side}`;

    const cardHTML = `
      <span class="card-icon">${ev.icon}</span>
      <div class="card-year">${ev.year}</div>
      <div class="card-title">${ev.title}</div>
      <div class="card-body">${ev.body}</div>
      <span class="card-tag tag-${ev.cat}">${TAG_LABELS[ev.cat]}</span>
    `;

    el.innerHTML = side === 'right'
      ? `<div class="spacer"></div><div class="node"><div class="node-dot"></div></div><div class="card">${cardHTML}</div>`
      : `<div class="card">${cardHTML}</div><div class="node"><div class="node-dot"></div></div>`;

    container.appendChild(el);
  });

  // scroll-triggered animations
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  container.querySelectorAll('.event').forEach(ev => obs.observe(ev));
}

// boot
buildTimeline('all');

// filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildTimeline(btn.dataset.filter);
    window.scrollTo({ top: document.getElementById('timeline').offsetTop - 80, behavior: 'smooth' });
  });
});
